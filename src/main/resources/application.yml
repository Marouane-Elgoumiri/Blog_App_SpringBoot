spring:
  profiles:
    active: dev
  application:
    name: cognipost
  config:
    import: "optional:dotenv:"

info:
  app:
    name: CogniPost
    description: Full-featured blog platform REST API
    version: 1.0.0

logging:
  level:
    root: INFO
    com.example.blog_app_springboot: DEBUG
    org.springframework.web.filter.CommonsRequestLoggingFilter: DEBUG

---
# DEV Profile - PostgreSQL (local development)
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/cognipost
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: false

server:
  port: 8080
  servlet:
    request:
      max-size: 10MB
  error:
    include-message: always
    include-binding-errors: always

app:
  jwt:
    secret: dev-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 604800000
  cors:
    allowed-origins: http://localhost:3000
  rate-limit:
    authenticated-requests-per-minute: 100
    anonymous-requests-per-minute: 20

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
    info:
      env:
        enabled: true

---
# POSTGRES Profile - Production deployment with environment variables
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cognipost}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
  h2:
    console:
      enabled: false
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${PORT:8080}
  servlet:
    request:
      max-size: 10MB
  error:
    include-message: never
    include-binding-errors: never

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 604800000
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://yourdomain.com}
  rate-limit:
    authenticated-requests-per-minute: 100
    anonymous-requests-per-minute: 20

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
    info:
      env:
        enabled: true

logging:
  level:
    root: WARN
    com.example.blog_app_springboot: INFO
    org.springframework.web.filter.CommonsRequestLoggingFilter: INFO

---
# TEST Profile - H2 in-memory (for unit tests)
spring:
  config:
    activate:
      on-profile: test
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: true

app:
  jwt:
    secret: test-secret-key-for-unit-tests-only-not-for-production
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 604800000
  cors:
    allowed-origins: http://localhost:3000
  rate-limit:
    authenticated-requests-per-minute: 100
    anonymous-requests-per-minute: 20
