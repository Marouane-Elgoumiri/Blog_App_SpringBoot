services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=postgres
      - DB_URL=jdbc:postgresql://db:5432/blog_app
      - DB_USERNAME=${DB_USERNAME:-bloguser}
      - DB_PASSWORD=${DB_PASSWORD:-blogpass}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - blognet
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=blog_app
      - POSTGRES_USER=${DB_USERNAME:-bloguser}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-blogpass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-bloguser} -d blog_app"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blognet
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  blognet:
    driver: bridge
